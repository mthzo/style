########################################################################################
# CONFIGURAÇÃO HYPRLAND - DEBIAN 13 - NVIDIA 940MX (MAXWELL)
########################################################################################

# 1. MONITORES
# Configura a resolução nativa de 1920x1080 a 60Hz.
monitor=,1920x1080@60,0x0,1

# 2. VARIÁVEIS DE AMBIENTE (CRÍTICO PARA NVIDIA)
env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = WLR_NO_HARDWARE_CURSORS,1
env = NVD_BACKEND,direct
env = QT_QPA_PLATFORM,wayland

# 3. AUTOSTART
# Inicializa os componentes essenciais
exec-once = waybar
exec-once = mako
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = gsettings set org.gnome.desktop.interface cursor-theme 'Adwaita'

# 4. INPUT (Teclado ABNT2)
input {
    kb_layout = br
    kb_variant =
    follow_mouse = 1
    touchpad {
        natural_scroll = true
    }
    sensitivity = 0 # -1.0 - 1.0, 0 significa sem modificação
}

# 5. ESTÉTICA (Gaps e Bordas)
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    layout = dwindle
}

# 6. DECORAÇÕES E PERFORMANCE (Ajustado para 940MX)
decoration {
    rounding = 10
    # Blur consome GPU; mantido baixo para estabilidade na Maxwell
    blur {
        enabled = true
        size = 3
        passes = 1
    }
    drop_shadow = true
    shadow_range = 4
    shadow_render_power = 3
    col.shadow = rgba(1a1a1aee)
}

# 7. ANIMAÇÕES
animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

# 8. ATALHOS DE TECLADO (Keybinds)
$mainMod = SUPER

bind = $mainMod, Q, killactive, 
bind = $mainMod, M, exit, 
bind = $mainMod, E, exec, nautilus
bind = $mainMod, T, exec, kitty
bind = $mainMod, Space, exec, wofi --show drun
bind = $mainMod, V, togglefloating, 
bind = $mainMod, F, fullscreen, 

# Movimentação de Foco
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Workspaces (1-9)
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
# ... (repetir para outros números conforme necessário)

# Mover janela para workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2

# Controle de Volume/Brilho (Requer brightnessctl e playerctl)
binde = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
binde = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
binde = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
binde = , XF86MonBrightnessDown, exec, brightnessctl set 5%-